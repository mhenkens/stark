<mat-form-field>
	<mat-label>{{ 'SHOWCASE.DEMO.DATE_PICKER.PLACEHOLDER' | translate }}</mat-label>
	<input matInput
		   [matDatepicker]="pickerReactiveForm"
		   [min]="minDate"
		   [max]="maxDate"
		   [formControl]="formControl"
		   required
		   [starkDateMask]="maskConfig"
	>
	<mat-hint>{{ maskConfig.format }}</mat-hint>
	<mat-datepicker-toggle matIconSuffix [for]="pickerReactiveForm"></mat-datepicker-toggle>
	<mat-datepicker #pickerReactiveForm></mat-datepicker>
	<mat-error *ngIf="formControl.hasError('required')">This is required</mat-error>
	<mat-error *ngIf="formControl.hasError('matDatepickerMin')">Min date</mat-error>
	<mat-error *ngIf="formControl.hasError('matDatepickerMax')">Max date</mat-error>
</mat-form-field>

<div>
	<mat-checkbox (change)="toggleFormControlState(formControl)" [checked]="formControl.disabled">
		{{ "SHOWCASE.COMMON.DISABLED" | translate }}
	</mat-checkbox>
</div>
